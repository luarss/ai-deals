name: Daily AI Deals Update

on:
  schedule:
    - cron: "17 2 * * *"  # 02:17 UTC daily — off-peak for GitHub Actions runners
  workflow_dispatch:        # allow manual trigger from Actions tab

permissions:
  contents: write           # needed to commit docs/index.html back to repo

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run scraper and renderer
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run python main.py

      - name: Commit and push updated page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit when files actually changed
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update AI deals [$(date -u +'%Y-%m-%d')]"
            git push
          fi
